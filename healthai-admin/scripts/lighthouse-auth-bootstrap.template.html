<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lighthouse Auth Bootstrap</title>
</head>

<body>
    <script>
        // Local-only helper for Lighthouse CLI audits on authenticated routes.
        if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            document.body.textContent = 'This page is restricted to local audits.';
            throw new Error('Restricted to localhost');
        }

        const params = new URLSearchParams(location.search);
        const authEnabled = params.get('auth') !== '0';
        const highContrast = params.get('highContrast') === '1';
        const themeMode = params.get('theme') === 'dark' ? 'dark' : 'light';
        const expiresAt = params.get('expiresAt');

        function readAuthStateFromQuery() {
            const encoded = params.get('authState');
            if (!encoded) return null;

            try {
                return JSON.parse(encoded);
            } catch (error) {
                throw new Error(`Invalid authState query payload: ${error instanceof Error ? error.message : String(error)}`);
            }
        }

        function isValidUser(user) {
            if (!user || typeof user !== 'object') return false;
            const requiredKeys = ['user_id', 'email', 'first_name', 'last_name', 'role_type'];
            return requiredKeys.every((key) => typeof user[key] === 'string' && user[key].trim().length > 0);
        }

        function isExpired(isoDate) {
            if (!isoDate) return false;
            const expiration = Date.parse(isoDate);
            if (Number.isNaN(expiration)) return true;
            return Date.now() > expiration;
        }

        const rawAuthState = readAuthStateFromQuery();
        if (authEnabled) {
            if (!rawAuthState || typeof rawAuthState !== 'object') {
                throw new Error('Missing authState payload while auth is enabled.');
            }
            if (!isValidUser(rawAuthState.user)) {
                throw new Error('Invalid authState.user payload.');
            }
            if (typeof rawAuthState.token !== 'string' || rawAuthState.token.trim().length === 0) {
                throw new Error('Invalid authState.token payload.');
            }
            if (isExpired(rawAuthState.expiresAt || expiresAt)) {
                throw new Error('Expired authState payload.');
            }

            const authState = {
                state: {
                    user: rawAuthState.user,
                    token: rawAuthState.token,
                    isAuthenticated: true,
                },
                version: 0,
            };
            sessionStorage.setItem('healthai-auth', JSON.stringify(authState));
        } else {
            sessionStorage.removeItem('healthai-auth');
        }

        localStorage.setItem('healthai-ui', JSON.stringify({
            state: {
                themeMode,
                highContrast,
            },
            version: 0,
        }));

        const target = params.get('target') || '/analytics/fitness';
        const safeTarget = target.startsWith('/') ? target : '/analytics/fitness';
        location.replace(safeTarget);
    </script>
</body>

</html>
