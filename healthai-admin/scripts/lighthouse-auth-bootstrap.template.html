<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lighthouse Auth Bootstrap</title>
</head>

<body>
    <script>
        // Local-only helper for Lighthouse CLI audits on authenticated routes.
        if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            document.body.textContent = 'This page is restricted to local audits.';
            throw new Error('Restricted to localhost');
        }

        let bootstrapConfig = null;
        if (typeof __LIGHTHOUSE_BOOTSTRAP_CONFIG__ !== 'undefined') {
            bootstrapConfig = __LIGHTHOUSE_BOOTSTRAP_CONFIG__;
        }

        if (!bootstrapConfig || typeof bootstrapConfig !== 'object') {
            const params = new URLSearchParams(location.search);
            const encodedCfg = params.get('cfg');
            if (encodedCfg) {
                try {
                    bootstrapConfig = JSON.parse(encodedCfg);
                } catch (error) {
                    throw new Error(`Invalid cfg payload: ${error instanceof Error ? error.message : String(error)}`);
                }
            }
        }

        if (!bootstrapConfig || typeof bootstrapConfig !== 'object') {
            throw new Error('Missing or invalid bootstrap config.');
        }

        function isValidUser(user) {
            if (!user || typeof user !== 'object') return false;
            const requiredKeys = ['user_id', 'email', 'first_name', 'last_name', 'role_type'];
            return requiredKeys.every((key) => typeof user[key] === 'string' && user[key].trim().length > 0);
        }

        const auth = bootstrapConfig.auth && typeof bootstrapConfig.auth === 'object'
            ? bootstrapConfig.auth
            : { enabled: false };
        const ui = bootstrapConfig.ui && typeof bootstrapConfig.ui === 'object'
            ? bootstrapConfig.ui
            : {};

        if (auth.enabled) {
            if (!isValidUser(auth.user)) {
                throw new Error('Invalid auth.user payload.');
            }
            if (typeof auth.token !== 'string' || auth.token.trim().length === 0) {
                throw new Error('Invalid auth.token payload.');
            }

            const authState = {
                state: {
                    user: auth.user,
                    token: auth.token,
                    isAuthenticated: true,
                },
                version: 0,
            };
            localStorage.setItem('healthai-auth', JSON.stringify(authState));
            sessionStorage.removeItem('healthai-auth');
        } else {
            localStorage.removeItem('healthai-auth');
            sessionStorage.removeItem('healthai-auth');
        }

        localStorage.setItem('healthai-ui', JSON.stringify({
            state: {
                themeMode: ui.themeMode === 'dark' ? 'dark' : 'light',
                highContrast: ui.highContrast === true,
            },
            version: 0,
        }));

        const target = typeof bootstrapConfig.target === 'string' ? bootstrapConfig.target : '/analytics/fitness';
        const safeTarget = target.startsWith('/') ? target : '/analytics/fitness';
        location.replace(safeTarget);
    </script>
</body>

</html>
